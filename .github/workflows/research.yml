name: PennyAlpha Research

# PAUSED - re-enable by removing the `if: false` conditions on each job

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run"
        required: true
        default: morning
        type: choice
        options:
          - morning
          - midday
          - afternoon
          - eod
          - monday_premarket
          - monday

jobs:
  monday_premarket:
    name: Monday Pre-Market Scan
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pre-market scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
        run: python agent.py monday_premarket

      - name: Commit results
        run: |
          git config user.email bot@pennyalpha.local
          git config user.name PennyAlpha_Bot
          git add TRADES.md
          git diff --cached --quiet || git commit -m "Research: Monday pre-market $(date -u +%Y-%m-%d)"
          git push

  monday:
    name: Monday Aggregation
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run Monday aggregation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
        run: python agent.py monday

      - name: Commit results
        run: |
          git config user.email bot@pennyalpha.local
          git config user.name PennyAlpha_Bot
          git add TRADES.md
          git diff --cached --quiet || git commit -m "Monday signals $(date -u +%Y-%m-%d)"
          git push

  morning:
    name: Morning Research
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run morning scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python agent.py morning

      - name: Execute trades
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python trade.py

      - name: Commit results
        run: |
          git config user.email bot@pennyalpha.local
          git config user.name PennyAlpha_Bot
          git add TRADES.md
          [ -f outbox.json ] && git add outbox.json || true
          git diff --cached --quiet || git commit -m "Morning scan + execution $(date -u +%Y-%m-%d)"
          git push

